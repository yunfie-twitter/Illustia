name: iOS Build (unsigned IPA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Install JS dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. EAS CLI ────────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # ── 5. Clean Xcode DerivedData ────────────────────────────────────────────
      - name: Clean Xcode derived data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/*

      # ── 6. Expo prebuild ──────────────────────────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --non-interactive --clean

      # ── 7. Verify iOS project & CocoaPods ────────────────────────────────────
      - name: Verify iOS project and install CocoaPods
        run: |
          cd ios
          echo "=== iOS project files ==="
          ls -la *.xcworkspace 2>/dev/null || ls -la *.xcodeproj
          if [ ! -d "Pods" ]; then
            echo "Pods directory not found – running pod install..."
            pod install
          else
            echo "Pods directory exists"
          fi

      # ── 8. xcodebuild build (unsigned) ───────────────────────────────────────
      - name: xcodebuild build (unsigned)
        run: |
          cd ios

          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          PROJECT=$(ls *.xcodeproj 2>/dev/null | head -1)

          if [ -n "$WORKSPACE" ]; then
            BUILD_FLAG="-workspace"; BUILD_NAME="$WORKSPACE"
          else
            BUILD_FLAG="-project";   BUILD_NAME="$PROJECT"
          fi

          echo "=== Available schemes ==="
          xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME" 2>&1 || true

          # "Pods" と "Tests" を除いた最初のスキームをアプリスキームとして使用
          SCHEME=$(xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME" 2>/dev/null \
            | awk '/Schemes:/,/^[[:space:]]*$/' \
            | grep -v "Schemes:" \
            | sed 's/^[[:space:]]*//' \
            | grep -v '^$' \
            | grep -vE -i "^(pods|tests?)" \
            | head -1)

          if [ -z "$SCHEME" ]; then
            SCHEME=$(xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME" 2>/dev/null \
              | awk '/Schemes:/,/^[[:space:]]*$/' \
              | grep -v "Schemes:" \
              | sed 's/^[[:space:]]*//' \
              | grep -v '^$' \
              | head -1)
          fi

          echo "Using scheme: [$SCHEME]"

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          LOG="$RUNNER_TEMP/build.log"

          # ビルド設定を確認して実際の出力先を記録
          echo "=== Build settings (SYMROOT / BUILT_PRODUCTS_DIR) ==="
          xcodebuild "$BUILD_FLAG" "$BUILD_NAME" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            -showBuildSettings 2>/dev/null \
            | grep -E "^\s+(SYMROOT|BUILT_PRODUCTS_DIR|CONFIGURATION_BUILD_DIR|TARGET_NAME)\s*=" \
            | head -20 \
            | tee "$RUNNER_TEMP/build_settings.txt" || true

          set -o pipefail
          xcodebuild \
            "$BUILD_FLAG" "$BUILD_NAME" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee "$LOG" \
          || (echo ""; echo "=== BUILD FAILED – last 100 lines ==="; tail -100 "$LOG"; exit 1)

      # ── 9. Upload raw build log on failure ────────────────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ github.sha }}
          path: ${{ runner.temp }}/build.log
          retention-days: 7

      # ── 10. Package .app into unsigned IPA ───────────────────────────────────
      - name: Package unsigned IPA
        run: |
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"

          # build_settings から SYMROOT を読んで .app を探す
          SYMROOT=$(grep "SYMROOT" "$RUNNER_TEMP/build_settings.txt" 2>/dev/null \
            | head -1 | sed 's/.*= *//')
          echo "SYMROOT from build settings: [$SYMROOT]"

          echo "=== Searching .app ==="

          find_app() {
            local base="$1"
            find "$base" -name "*.app" -type d \
              -not -name "*.appex" \
              -not -path "*iphonesimulator*" \
              -not -path "*simulator*" \
              2>/dev/null | sort | head -1
          }

          APP_PATH=""

          # 1. SYMROOT (build settings から取得)
          [ -n "$SYMROOT" ] && APP_PATH=$(find_app "$SYMROOT")

          # 2. DerivedData/Build/Products
          [ -z "$APP_PATH" ] && APP_PATH=$(find_app "$DERIVED_DATA/Build/Products")

          # 3. DerivedData 全体
          [ -z "$APP_PATH" ] && APP_PATH=$(find_app "$DERIVED_DATA")

          # 4. RUNNER_TEMP 全体
          [ -z "$APP_PATH" ] && APP_PATH=$(find_app "$RUNNER_TEMP")

          # 5. システム DerivedData
          [ -z "$APP_PATH" ] && APP_PATH=$(find_app "$HOME/Library/Developer/Xcode/DerivedData")

          echo "Found .app: [$APP_PATH]"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found after all search paths."
            echo "--- RUNNER_TEMP tree ---"
            find "$RUNNER_TEMP" -maxdepth 5 \
              -not -path "*_runner_file_commands*" \
              -not -path "*.sh" \
              2>/dev/null | head -60
            exit 1
          fi

          PAYLOAD="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD"
          cp -R "$APP_PATH" "$PAYLOAD/"

          cd "$RUNNER_TEMP"
          zip -r unsigned.ipa Payload/
          ls -lh unsigned.ipa
          echo "IPA created: $RUNNER_TEMP/unsigned.ipa"

      # ── 11. Upload IPA as artifact ────────────────────────────────────────────
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: illustia-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/unsigned.ipa
          retention-days: 14
