name: iOS Build unsigned IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Install JS dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install EAS CLI ───────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # ── 5. Clean Xcode DerivedData ───────────────────────────────────────────
      - name: Clean Xcode derived data
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf "$RUNNER_TEMP/DerivedData"
          rm -rf "$RUNNER_TEMP/BuildProducts"
          rm -rf "$RUNNER_TEMP/Payload"
          rm -f "$RUNNER_TEMP/unsigned.ipa"

      # ── 6. Expo prebuild ─────────────────────────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --non-interactive --clean

      # ── 7. Verify iOS project and install CocoaPods ──────────────────────────
      - name: Verify iOS project and install CocoaPods
        run: |
          cd ios

          echo "=== iOS directory ==="
          ls -la

          echo "=== Xcode project/workspace ==="
          ls -la *.xcworkspace 2>/dev/null || true
          ls -la *.xcodeproj 2>/dev/null || true

          echo "=== CocoaPods install ==="
          pod install

            # ── 8. Build .app without signing ────────────────────────────────────────
      - name: xcodebuild build unsigned app
        run: |
          cd ios

          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          PROJECT=$(ls -d *.xcodeproj 2>/dev/null | head -1)

          if [ -n "$WORKSPACE" ]; then
            BUILD_FLAG="-workspace"
            BUILD_NAME="$WORKSPACE"
          elif [ -n "$PROJECT" ]; then
            BUILD_FLAG="-project"
            BUILD_NAME="$PROJECT"
          else
            echo "ERROR: .xcworkspace or .xcodeproj not found"
            exit 1
          fi

          echo "Using $BUILD_FLAG $BUILD_NAME"

          echo "=== Available schemes ==="
          xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME"

          # アプリ本体の scheme を固定
          SCHEME="Illustia"
          echo "Using scheme: [$SCHEME]"

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          BUILD_DIR="$RUNNER_TEMP/BuildProducts"
          LOG="$RUNNER_TEMP/build.log"

          rm -rf "$DERIVED_DATA" "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"

          echo "=== Build settings preview ==="
          xcodebuild \
            "$BUILD_FLAG" "$BUILD_NAME" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            -showBuildSettings 2>/dev/null \
            | grep -E "^\s+(TARGET_NAME|PRODUCT_NAME|WRAPPER_NAME|BUILT_PRODUCTS_DIR|CONFIGURATION_BUILD_DIR|SYMROOT)\s*=" \
            | tee "$RUNNER_TEMP/build_settings.txt" || true

          echo "=== Start xcodebuild ==="
          set -o pipefail

          xcodebuild \
            "$BUILD_FLAG" "$BUILD_NAME" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee "$LOG"

          echo "=== BuildProducts tree ==="
          find "$BUILD_DIR" -maxdepth 5 -print || true

          echo "=== DerivedData Build tree ==="
          find "$DERIVED_DATA/Build" -maxdepth 5 -print || true

      # ── 9. Upload build log on failure ───────────────────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ github.sha }}
          path: |
            ${{ runner.temp }}/build.log
            ${{ runner.temp }}/build_settings.txt
          retention-days: 7

      # ── 10. Package .app into unsigned IPA ───────────────────────────────────
      - name: Package unsigned IPA
        run: |
          BUILD_DIR="$RUNNER_TEMP/BuildProducts"

          echo "=== Searching .app ==="

          APP_PATH=$(find "$BUILD_DIR" \
            -name "*.app" \
            -type d \
            -not -name "*.appex" \
            -not -path "*iphonesimulator*" \
            -not -path "*simulator*" \
            | sort \
            | head -1)

          echo "Found .app: [$APP_PATH]"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            echo "--- BuildProducts tree ---"
            find "$BUILD_DIR" -maxdepth 8 -print || true
            echo "--- RUNNER_TEMP tree ---"
            find "$RUNNER_TEMP" -maxdepth 6 -print || true
            exit 1
          fi

          PAYLOAD="$RUNNER_TEMP/Payload"
          rm -rf "$PAYLOAD"
          mkdir -p "$PAYLOAD"

          cp -R "$APP_PATH" "$PAYLOAD/"

          cd "$RUNNER_TEMP"
          rm -f unsigned.ipa
          zip -r unsigned.ipa Payload

          echo "=== IPA created ==="
          ls -lh unsigned.ipa

      # ── 11. Upload unsigned IPA ──────────────────────────────────────────────
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: illustia-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/unsigned.ipa
          retention-days: 14
