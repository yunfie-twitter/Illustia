name: iOS Build (unsigned IPA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Install JS dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. EAS CLI ────────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # ── 5. Prebuild (generate ios/ Xcode project) ─────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --non-interactive

      # ── 6. xcodebuild – build .app (no signing) ───────────────────────────────
      - name: xcodebuild archive (unsigned)
        run: |
          cd ios

          # Resolve workspace or project name dynamically
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          PROJECT=$(ls *.xcodeproj 2>/dev/null | head -1)

          if [ -n "$WORKSPACE" ]; then
            BUILD_FLAG="-workspace"
            BUILD_NAME="$WORKSPACE"
          else
            BUILD_FLAG="-project"
            BUILD_NAME="$PROJECT"
          fi

          echo "Build target: $BUILD_FLAG $BUILD_NAME"

          # List available schemes for debugging
          xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME" 2>&1 || true

          SCHEME=$(xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME" 2>/dev/null \
            | awk '/Schemes:/,/^$/' \
            | grep -v "Schemes:" \
            | sed 's/^[[:space:]]*//' \
            | grep -v '^$' \
            | head -1)

          echo "Using scheme: $SCHEME"

          set -o pipefail
          xcodebuild \
            "$BUILD_FLAG" "$BUILD_NAME" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Illustia.xcarchive" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            clean archive 2>&1

      # ── 7. Verify archive and package .app into unsigned IPA ─────────────────
      - name: Package unsigned IPA
        run: |
          echo "=== xcarchive contents ==="
          find "$RUNNER_TEMP/Illustia.xcarchive" -maxdepth 4 | head -40

          APP_PATH=$(find "$RUNNER_TEMP/Illustia.xcarchive/Products" -name "*.app" -maxdepth 3 | head -1)
          echo "Found .app: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found in xcarchive"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"

          cd "$RUNNER_TEMP"
          zip -r unsigned.ipa Payload/
          echo "IPA created at: $RUNNER_TEMP/unsigned.ipa"

      # ── 8. Upload IPA as artifact ─────────────────────────────────────────────
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: illustia-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/unsigned.ipa
          retention-days: 14
