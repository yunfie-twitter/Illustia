name: iOS Build (unsigned IPA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Install JS dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. EAS CLI ────────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # ── 5. Clean Xcode DerivedData ────────────────────────────────────────────
      - name: Clean Xcode derived data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/*

      # ── 6. Expo prebuild ──────────────────────────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --non-interactive --clean

      # ── 7. Verify iOS project & CocoaPods ────────────────────────────────────
      - name: Verify iOS project and install CocoaPods
        run: |
          cd ios
          echo "=== iOS project files ==="
          ls -la *.xcworkspace 2>/dev/null || ls -la *.xcodeproj
          if [ ! -d "Pods" ]; then
            echo "Pods directory not found – running pod install..."
            pod install
          else
            echo "Pods directory exists"
          fi

      # ── 8. xcodebuild build (unsigned) ───────────────────────────────────────
      - name: xcodebuild build (unsigned)
        run: |
          cd ios

          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          PROJECT=$(ls *.xcodeproj 2>/dev/null | head -1)

          if [ -n "$WORKSPACE" ]; then
            BUILD_FLAG="-workspace"; BUILD_NAME="$WORKSPACE"
          else
            BUILD_FLAG="-project";   BUILD_NAME="$PROJECT"
          fi

          echo "Build target: $BUILD_FLAG $BUILD_NAME"

          # スキーム一覧を表示
          echo "=== Available schemes ==="
          xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME" 2>&1 || true

          # "Pods" を含まないスキームを優先選択（アプリスキームを狙う）
          SCHEME=$(xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME" 2>/dev/null \
            | awk '/Schemes:/,/^$/' \
            | grep -v "Schemes:" \
            | sed 's/^[[:space:]]*//' \
            | grep -v '^$' \
            | grep -vi "pods" \
            | head -1)

          # フォールバック: 最初のスキーム
          if [ -z "$SCHEME" ]; then
            SCHEME=$(xcodebuild -list "$BUILD_FLAG" "$BUILD_NAME" 2>/dev/null \
              | awk '/Schemes:/,/^$/' \
              | grep -v "Schemes:" \
              | sed 's/^[[:space:]]*//' \
              | grep -v '^$' \
              | head -1)
          fi

          echo "Using scheme: $SCHEME"

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          LOG="$RUNNER_TEMP/build.log"

          set -o pipefail
          xcodebuild \
            "$BUILD_FLAG" "$BUILD_NAME" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee "$LOG" \
          || (echo ""; echo "=== BUILD FAILED – last 100 lines ==="; tail -100 "$LOG"; exit 1)

      # ── 9. Upload raw build log on failure ────────────────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ github.sha }}
          path: ${{ runner.temp }}/build.log
          retention-days: 7

      # ── 10. Package .app into unsigned IPA ───────────────────────────────────
      - name: Package unsigned IPA
        run: |
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"

          echo "=== Searching .app in DerivedData ==="
          find "$DERIVED_DATA" -name "*.app" -type d 2>/dev/null | head -20 || echo "(none found)"

          APP_PATH=$(find "$DERIVED_DATA" -name "*.app" -type d \
            -not -name "*.appex" \
            -not -path "*simulator*" \
            -not -path "*iphonesimulator*" \
            2>/dev/null | sort | head -1)

          # Fallback: ~/Library/Developer/Xcode/DerivedData (system default)
          if [ -z "$APP_PATH" ]; then
            echo "Not in RUNNER_TEMP DerivedData, searching system DerivedData..."
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d \
              -not -name "*.appex" \
              -not -path "*simulator*" \
              -not -path "*iphonesimulator*" \
              2>/dev/null | sort | head -1)
          fi

          echo "Found .app: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found. Dumping known build paths:"
            echo "--- RUNNER_TEMP/DerivedData ---"
            find "$DERIVED_DATA" -maxdepth 6 2>/dev/null | head -40 || echo "(empty)"
            echo "--- system DerivedData ---"
            find ~/Library/Developer/Xcode/DerivedData -maxdepth 5 2>/dev/null | grep -E "\.(app|a)$" | head -40 || echo "(empty)"
            exit 1
          fi

          PAYLOAD="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD"
          cp -R "$APP_PATH" "$PAYLOAD/"

          cd "$RUNNER_TEMP"
          zip -r unsigned.ipa Payload/
          ls -lh unsigned.ipa
          echo "IPA created: $RUNNER_TEMP/unsigned.ipa"

      # ── 11. Upload IPA as artifact ────────────────────────────────────────────
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: illustia-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/unsigned.ipa
          retention-days: 14
