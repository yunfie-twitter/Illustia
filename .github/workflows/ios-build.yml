name: iOS Build (IPA)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile (development / preview / production)"
        required: false
        default: "production"

jobs:
  build-ios:
    name: Build IPA on macOS
    runs-on: macos-latest

    env:
      # EAS / Expo
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Keychain
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Install JS dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. EAS CLI ────────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # ── 5. Restore certificates from Secrets ─────────────────────────────────
      #  Secrets required:
      #    IOS_DIST_P12_BASE64        … base64 of credentials/7dbe2c4f_dist.p12
      #    IOS_DIST_P12_PASSWORD      … p12 password (currently "flarestore")
      #    IOS_PROVISIONING_PROFILE_BASE64 … base64 of credentials/7dbe2c4f_dist.mobileprovision

      - name: Decode distribution certificate
        run: |
          echo "${{ secrets.IOS_DIST_P12_BASE64 }}" | base64 --decode > credentials/7dbe2c4f_dist.p12

      - name: Decode provisioning profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > credentials/7dbe2c4f_dist.mobileprovision

      # ── 6. Import certificate into keychain ────────────────────────────────────
      - name: Import certificate into macOS keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import credentials/7dbe2c4f_dist.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "${{ secrets.IOS_DIST_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S "apple-tool:,apple:" \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME"

      # ── 7. Install provisioning profile ──────────────────────────────────────
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp credentials/7dbe2c4f_dist.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 8. EAS local build ────────────────────────────────────────────────────
      - name: Run EAS build (local)
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas build \
            --platform ios \
            --profile "$PROFILE" \
            --local \
            --non-interactive \
            --output build/output.ipa

      # ── 9. Upload IPA as artifact ─────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: illustia-ios-${{ github.sha }}
          path: build/output.ipa
          retention-days: 14

      # ── 10. Cleanup keychain ─────────────────────────────────────────────────
      - name: Delete keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_NAME" || true
